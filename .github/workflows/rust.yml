name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings"
  # COMPAT: vapoursynth crate 0.4 expects the legacy VSScript ABI from R66.
  VAPOURSYNTH_SHA: "fe6c67cdb17f41160c79434f0240077f74de9fd1"

jobs:
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            git \
            libdav1d-dev \
            libfontconfig1-dev \
            libtool \
            libzimg-dev \
            pkg-config \
            python3-dev
      - name: Install VapourSynth
        run: |
          git init "${RUNNER_TEMP}/vapoursynth"
          cd "${RUNNER_TEMP}/vapoursynth"
          git remote add origin https://github.com/vapoursynth/vapoursynth.git
          git fetch --depth 1 origin "${VAPOURSYNTH_SHA}"
          git checkout --detach FETCH_HEAD
          ./autogen.sh
          PYTHON=/usr/bin/python3 ./configure --prefix=/usr --disable-python-module --disable-vspipe
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig
      # rust-version from Cargo.toml
      - name: Install Rust 1.65.0
        uses: dtolnay/rust-toolchain@1.65.0
      - name: Use predefined lockfile
        run: mv Cargo.lock.MSRV Cargo.lock
      - name: Build
        run: cargo check --locked

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            git \
            libdav1d-dev \
            libfontconfig1-dev \
            libtool \
            libzimg-dev \
            pkg-config \
            python3-dev
      - name: Install VapourSynth
        run: |
          git init "${RUNNER_TEMP}/vapoursynth"
          cd "${RUNNER_TEMP}/vapoursynth"
          git remote add origin https://github.com/vapoursynth/vapoursynth.git
          git fetch --depth 1 origin "${VAPOURSYNTH_SHA}"
          git checkout --detach FETCH_HEAD
          ./autogen.sh
          PYTHON=/usr/bin/python3 ./configure --prefix=/usr --disable-python-module --disable-vspipe
          make -j"$(nproc)"
          sudo make install
          sudo ldconfig
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test
